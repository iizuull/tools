<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Pro Cloud v27.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2563eb; --bg: #000; --card: #121212; --border: #333; --text: #fff; --gray: #888; --danger: #ef4444; --success: #22c55e; --orange: #f59e0b; --purple: #a855f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding-bottom: 100px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .stat-box { background: #1a1a1a; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-box small { display: block; font-size: 8px; color: var(--gray); text-transform: uppercase; }
        .stat-box b { font-size: 13px; }

        /* Form & QR */
        .card-form { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px; display: none; border: 1px solid var(--primary) !important; }
        .btn-qr { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }

        /* Selection Bar (Sticky Bottom) */
        .selection-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #1a1a1a; border-top: 2px solid var(--primary); padding: 15px; box-sizing: border-box; display: none; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        .grid-bulk { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-bulk { border: none; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 6px; padding: 12px 5px; }

        /* Account Cards */
        .acc-item { background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; gap: 10px; }
        .acc-check { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; margin-top: 5px; }
        .otp-box { background: rgba(37, 99, 235, 0.05); border: 1px solid #222; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: space-between; }
        .otp-num { font-family: monospace; font-size: 26px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        .btn-action-small { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .status-badge { font-size: 8px; padding: 4px 8px; border-radius: 5px; font-weight: 900; cursor: pointer; border: none; }
        .status-STOK { background: var(--orange); color: #000; }
        .status-G2G { background: var(--success); color: #000; }
        .status-SOLD { background: var(--purple); color: #fff; }

        #main-app, #login-screen { display: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div id="login-screen" style="text-align: center; margin-top: 100px;">
        <h2>2FA AUTH CLOUD</h2>
        <button onclick="login()" style="padding: 15px; width: 100%; border-radius: 10px; background: white; font-weight: bold; cursor: pointer;">SIGN IN WITH GOOGLE</button>
    </div>

    <div id="main-app">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <h3 style="margin:0">Inventory Global</h3>
                <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:10px">LOGOUT</button>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><small>Total</small><b id="countTotal">0</b></div>
                <div class="stat-box"><small style="color:var(--orange)">Stok</small><b id="countStok">0</b></div>
                <div class="stat-box"><small style="color:var(--success)">G2G</small><b id="countG2G">0</b></div>
                <div class="stat-box"><small style="color:var(--purple)">Sold</small><b id="countSold">0</b></div>
            </div>
        </div>

        <div class="card-form">
            <div id="reader"></div>
            <button id="qr-btn" class="btn-qr" onclick="toggleScanner()">📷 SCAN QR & AUTO SAVE</button>
            <input type="text" id="accName" placeholder="Email Akun">
            <input type="text" id="accKey" placeholder="Secret Key">
            <button class="btn-qr" style="background:#fff; color:#000" onclick="saveAccount()">SAVE ACCOUNT</button>
        </div>

        <div id="displayList"></div>
    </div>

    <div class="selection-bar" id="selectionBar">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
            <label style="font-size:12px; font-weight:bold"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> Select All</label>
            <span id="selCount" style="font-size:11px; color:var(--primary)">0 selected</span>
        </div>
        <div class="grid-bulk">
            <button class="btn-bulk" style="background:var(--primary); color:white" onclick="bulkCopy()">COPY ALL (Format)</button>
            <button class="btn-bulk" style="background:var(--success); color:black" onclick="bulkUpdate('SOLD')">MARK SOLD</button>
            <button class="btn-bulk" style="background:var(--danger); color:white" onclick="bulkDelete()">DELETE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3mIXsaFlLbpKm5qufpP6Trr9S1DXixKk",
        authDomain: "fanews-b8b0f.firebaseapp.com",
        databaseURL: "https://fanews-b8b0f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fanews-b8b0f",
        storageBucket: "fanews-b8b0f.firebasestorage.app",
        messagingSenderId: "514202109743",
        appId: "1:514202109743:web:ef7f55adfaed815bbc43da"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let userUid = null, accounts = [], html5QrCode = null;

    auth.onAuthStateChanged(user => {
        if (user) { userUid = user.uid; document.getElementById('login-screen').style.display='none'; document.getElementById('main-app').style.display='block'; loadData(); }
        else { document.getElementById('login-screen').style.display='block'; document.getElementById('main-app').style.display='none'; }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { if(confirm("Logout?")) auth.signOut(); }

    function toggleScanner() {
        const readerDiv = document.getElementById('reader');
        const qrBtn = document.getElementById('qr-btn');
        if (!html5QrCode) {
            readerDiv.style.display = 'block'; qrBtn.innerText = "🛑 STOP SCANNING";
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => parseQrCode(text), () => {});
        } else { stopScanner(); }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { document.getElementById('reader').style.display = 'none'; document.getElementById('qr-btn').innerText = "📷 SCAN QR & AUTO SAVE"; html5QrCode = null; });
        }
    }

    function parseQrCode(url) {
        try {
            const uri = new URL(url); const secret = uri.searchParams.get("secret");
            let label = decodeURIComponent(uri.pathname.split('/').pop());
            let email = label.includes(':') ? label.split(':').pop().trim() : label.trim();
            if (secret && email) { document.getElementById('accName').value = email; document.getElementById('accKey').value = secret.toUpperCase(); saveAccount(); }
        } catch (e) {}
    }

    function loadData() {
        db.ref('users/' + userUid).on('value', snapshot => {
            accounts = []; snapshot.forEach(child => { accounts.push({ id: child.key, ...child.val() }); });
            document.getElementById('countTotal').innerText = accounts.length;
            document.getElementById('countStok').innerText = accounts.filter(a => a.status === 'STOK').length;
            document.getElementById('countG2G').innerText = accounts.filter(a => a.status === 'G2G').length;
            document.getElementById('countSold').innerText = accounts.filter(a => a.status === 'SOLD').length;
            render();
        });
    }

    function saveAccount() {
        const name = document.getElementById('accName').value.trim().toLowerCase();
        const key = document.getElementById('accKey').value.replace(/\s/g, '').toUpperCase();
        if (!name || !key) return;
        if (accounts.some(acc => acc.name.toLowerCase() === name)) { alert("Email sudah ada!"); return; }
        const date = new Date().toLocaleString('id-ID', { day:'2-digit', month:'short' });
        db.ref('users/' + userUid).push({ name, key, status: 'STOK', date }).then(() => { document.getElementById('accName').value = ''; document.getElementById('accKey').value = ''; });
    }

    function render() {
        const div = document.getElementById('displayList');
        div.innerHTML = '';
        [...accounts].reverse().forEach(acc => {
            div.innerHTML += `
                <div class="acc-item" data-id="${acc.id}">
                    <input type="checkbox" class="acc-check" onclick="updateSelCount()">
                    <div style="flex-grow:1">
                        <div style="display:flex; justify-content:space-between">
                            <span style="font-weight:bold">${acc.name}</span>
                            <button class="status-badge status-${acc.status || 'STOK'}" onclick="cycleStatus('${acc.id}', '${acc.status}')">${acc.status || 'STOK'}</button>
                        </div>
                        <span style="font-size:10px; color:var(--gray); font-family:monospace">${acc.key.match(/.{1,4}/g).join(' ')}</span>
                        <div class="otp-box">
                            <div class="otp-num" id="otp-${acc.id}">------</div>
                            <button class="btn-action-small" style="background:var(--primary)" onclick="copyText('${acc.id}')">OTP</button>
                        </div>
                        <div style="display:flex; gap:8px">
                            <button class="btn-action-small" onclick="copyValue('${acc.name}', this, 'MAIL')">MAIL</button>
                            <button class="btn-action-small" onclick="copyValue('${acc.key}', this, 'KEY')">KEY</button>
                        </div>
                    </div>
                </div>`;
        });
        updateSelCount();
    }

    function updateSelCount() {
        const count = document.querySelectorAll('.acc-check:checked').length;
        document.getElementById('selCount').innerText = count + " selected";
        document.getElementById('selectionBar').style.display = count > 0 ? 'block' : 'none';
    }

    function toggleSelectAll() {
        const checked = document.getElementById('selectAll').checked;
        document.querySelectorAll('.acc-check').forEach(c => c.checked = checked);
        updateSelCount();
    }

    function bulkCopy() {
        let text = "";
        document.querySelectorAll('.acc-check:checked').forEach(c => {
            const id = c.closest('.acc-item').getAttribute('data-id');
            const acc = accounts.find(a => a.id === id);
            text += `${acc.name}\n${acc.key}\n\n`; // FORMAT: ATAS MAIL BAWAH KEY
        });
        navigator.clipboard.writeText(text.trim());
        alert("Copied " + document.querySelectorAll('.acc-check:checked').length + " accounts!");
    }

    function bulkUpdate(s) {
        document.querySelectorAll('.acc-check:checked').forEach(c => {
            const id = c.closest('.acc-item').getAttribute('data-id');
            db.ref(`users/${userUid}/${id}`).update({ status: s });
        });
    }

    function bulkDelete() {
        if(confirm("Hapus akun terpilih?")) {
            document.querySelectorAll('.acc-check:checked').forEach(c => {
                const id = c.closest('.acc-item').getAttribute('data-id');
                db.ref(`users/${userUid}/${id}`).remove();
            });
        }
    }

    function copyText(id) {
        const txt = document.getElementById('otp-' + id).innerText;
        navigator.clipboard.writeText(txt);
        alert("OTP Copied: " + txt);
    }

    function copyValue(txt, btn, label) {
        navigator.clipboard.writeText(txt);
        btn.innerText = "DONE"; setTimeout(() => btn.innerText = label, 800);
    }

    function cycleStatus(id, cur) {
        const next = cur === 'STOK' ? 'G2G' : (cur === 'G2G' ? 'SOLD' : 'STOK');
        db.ref(`users/${userUid}/${id}`).update({ status: next });
    }

    setInterval(() => {
        accounts.forEach(acc => {
            try {
                let totp = new OTPAuth.TOTP({ secret: acc.key });
                const el = document.getElementById('otp-' + acc.id);
                if(el) el.innerText = totp.generate();
            } catch (e) {}
        });
    }, 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Pro - G2G Filter</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; --bg: #000; --card: #121212; --border: #333; 
            --text: #fff; --gray: #888; --danger: #ef4444; --success: #22c55e; --orange: #f59e0b;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .wrapper { width: 100%; max-width: 480px; }
        .login-screen { text-align: center; margin-top: 100px; padding: 30px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
        .btn-google { background: #fff; color: #000; padding: 14px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .header { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .stock-info { font-size: 11px; color: var(--gray); display: flex; gap: 8px; margin-top: 8px; }
        .badge-info { padding: 4px 8px; border-radius: 6px; background: #1a1a1a; border: 1px solid var(--border); }
        
        /* Filter Tabs */
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--gray); cursor: pointer; font-size: 11px; font-weight: bold; text-align: center; text-transform: uppercase; transition: 0.2s; }
        .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .card-form { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        .btn-save { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; }

        .acc-item { background: var(--card); padding: 18px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; position: relative; }
        .status-btn { font-size: 9px; font-weight: 900; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; }
        .status-uploaded { background: var(--success); color: #000; }
        .status-pending { background: var(--orange); color: #000; }

        .otp-box { display: flex; align-items: center; justify-content: space-between; background: rgba(37,99,235,0.05); padding: 12px; border-radius: 8px; margin: 12px 0; border: 1px solid var(--border); }
        .otp-num { font-family: monospace; font-size: 28px; font-weight: 700; color: var(--primary); letter-spacing: 2px; }
        .timer-container { position: relative; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .timer-text { font-size: 9px; font-weight: bold; color: var(--gray); position: absolute; }
        .timer-svg { transform: rotate(-90deg); width: 24px; height: 24px; }
        .timer-circle-bg { fill: none; stroke: var(--border); stroke-width: 3; }
        .timer-circle-prog { fill: none; stroke: var(--primary); stroke-width: 3; stroke-dasharray: 70; }

        .btn-action { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-copy-main { background: var(--primary); color: #fff; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        #main-app { display: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div id="login-screen" class="login-screen">
        <h2>2FA AUTH CLOUD</h2>
        <button class="btn-google" onclick="login()">SIGN IN WITH GOOGLE</button>
    </div>

    <div id="main-app">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3 style="margin:0">Stock Manager</h3>
                <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:10px">LOGOUT</button>
            </div>
            <div class="stock-info">
                <span class="badge-info">TOTAL: <b id="countTotal">0</b></span>
                <span class="badge-info" style="color:var(--success)">G2G: <b id="countG2G">0</b></span>
                <span class="badge-info" style="color:var(--orange)">BELUM: <b id="countBelum">0</b></span>
            </div>
        </div>

        <div class="card-form">
            <input type="text" id="accName" placeholder="Email / Akun" autocomplete="off">
            <input type="text" id="accKey" placeholder="Secret Key" oninput="this.value = this.value.replace(/\s/g, '').toUpperCase()" autocomplete="off">
            <button class="btn-save" onclick="saveAccount()">Save to Cloud</button>
        </div>

        <div class="filter-tabs">
            <div class="tab active" onclick="setFilter('ALL', this)">Semua</div>
            <div class="tab" onclick="setFilter('UPLOAD G2G', this)">G2G</div>
            <div class="tab" onclick="setFilter('BELUM', this)">Belum</div>
        </div>

        <input type="text" id="searchInput" placeholder="Search accounts..." oninput="render()" style="background:var(--card); margin-bottom:15px">

        <div id="displayList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3mIXsaFlLbpKm5qufpP6Trr9S1DXixKk",
        authDomain: "fanews-b8b0f.firebaseapp.com",
        databaseURL: "https://fanews-b8b0f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fanews-b8b0f",
        storageBucket: "fanews-b8b0f.firebasestorage.app",
        messagingSenderId: "514202109743",
        appId: "1:514202109743:web:ef7f55adfaed815bbc43da"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let userUid = null, accounts = [], currentFilter = 'ALL';

    auth.onAuthStateChanged(user => {
        if (user) {
            userUid = user.uid;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { if(confirm("Logout?")) auth.signOut(); }

    function loadData() {
        db.ref('users/' + userUid).on('value', snapshot => {
            accounts = [];
            snapshot.forEach(child => { accounts.push({ id: child.key, ...child.val() }); });
            updateCounters();
            render();
        });
    }

    function updateCounters() {
        const total = accounts.length;
        const g2g = accounts.filter(a => a.status === 'UPLOAD G2G').length;
        document.getElementById('countTotal').innerText = total;
        document.getElementById('countG2G').innerText = g2g;
        document.getElementById('countBelum').innerText = total - g2g;
    }

    function setFilter(f, el) {
        currentFilter = f;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function saveAccount() {
        const name = document.getElementById('accName').value.trim();
        const key = document.getElementById('accKey').value.trim();
        if (name && key) {
            db.ref('users/' + userUid).push({ name, key, status: 'BELUM' });
            document.getElementById('accName').value = ''; document.getElementById('accKey').value = '';
        }
    }

    function toggleStatus(id, current) {
        const next = current === 'UPLOAD G2G' ? 'BELUM' : 'UPLOAD G2G';
        db.ref('users/' + userUid + '/' + id).update({ status: next });
    }

    function render() {
        const div = document.getElementById('displayList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = [...accounts].reverse();
        if (currentFilter !== 'ALL') filtered = filtered.filter(a => a.status === currentFilter);
        filtered = filtered.filter(a => a.name.toLowerCase().includes(search));
        
        div.innerHTML = '';
        filtered.forEach(acc => {
            const isG2G = acc.status === 'UPLOAD G2G';
            div.innerHTML += `
                <div class="acc-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
                        <span style="font-weight:bold; font-size:14px">${acc.name}</span>
                        <button class="status-btn ${isG2G ? 'status-uploaded' : 'status-pending'}" 
                                onclick="toggleStatus('${acc.id}', '${acc.status}')">
                                ${acc.status}
                        </button>
                    </div>
                    <div class="otp-box">
                        <div style="display:flex; align-items:center; gap:10px; cursor:pointer" onclick="copyOTP('${acc.id}', null)">
                            <div class="timer-container">
                                <svg class="timer-svg"><circle class="timer-circle-bg" cx="12" cy="12" r="11"/><circle class="timer-circle-prog" id="circle-${acc.id}" cx="12" cy="12" r="11"/></svg>
                                <div class="timer-text" id="t-${acc.id}">30</div>
                            </div>
                            <div class="otp-num" id="otp-${acc.id}">------</div>
                        </div>
                        <button class="btn-copy-main" id="btn-otp-${acc.id}" onclick="copyOTP('${acc.id}', this)">COPY</button>
                    </div>
                    <div style="display:flex; justify-content:space-between">
                        <div>
                            <button class="btn-action" onclick="copyText('${acc.name}', this, 'MAIL')">MAIL</button>
                            <button class="btn-action" onclick="copyText('${acc.key}', this, 'KEY')">KEY</button>
                        </div>
                        <button onclick="del('${acc.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:10px">Hapus</button>
                    </div>
                </div>`;
        });
    }

    function updateCodes() {
        const remain = 30 - (Math.floor(Date.now() / 1000) % 30);
        const offset = (remain / 30) * 70;
        accounts.forEach(acc => {
            try {
                let totp = new OTPAuth.TOTP({ secret: acc.key });
                const el = document.getElementById('otp-' + acc.id);
                if(el) el.innerText = totp.generate();
                const circ = document.getElementById('circle-' + acc.id);
                if(circ) circ.style.strokeDashoffset = 70 - offset;
                const txt = document.getElementById('t-' + acc.id);
                if(txt) txt.innerText = remain;
            } catch (e) {}
        });
    }

    function copyText(txt, btn, label) {
        navigator.clipboard.writeText(txt);
        btn.innerText = 'OK';
        setTimeout(() => btn.innerText = label, 800);
    }

    function copyOTP(id, btn) {
        const text = document.getElementById('otp-' + id).innerText;
        navigator.clipboard.writeText(text);
        const targetBtn = btn || document.getElementById('btn-otp-' + id);
        targetBtn.innerText = 'DONE';
        setTimeout(() => targetBtn.innerText = 'COPY', 800);
    }

    function del(id) { if(confirm("Hapus?")) db.ref('users/' + userUid + '/' + id).remove(); }
    setInterval(updateCodes, 1000);
</script>
</body>
</html>

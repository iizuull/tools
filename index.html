<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Pro Cloud - G2G Mass Upload</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; --bg: #000; --card: #121212; --border: #333; 
            --text: #fff; --gray: #888; --danger: #ef4444; --success: #22c55e; --orange: #f59e0b;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .wrapper { width: 100%; max-width: 480px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .stock-info { font-size: 10px; color: var(--gray); display: flex; gap: 5px; }

        /* Filter & Action Tabs */
        .filter-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--gray); cursor: pointer; font-size: 10px; font-weight: bold; text-align: center; }
        .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Selection Bar */
        .selection-bar { display: none; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 12px; background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .btn-top { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* Form */
        .card-form { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        .btn-save { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; }

        /* Account Item */
        .acc-item { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; gap: 12px; position: relative; }
        .acc-check { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; margin-top: 5px; }
        .content-area { flex-grow: 1; }
        
        .email-display { font-weight: bold; font-size: 15px; display: block; }
        .key-display { font-family: monospace; font-size: 11px; color: var(--gray); display: block; margin-top: 2px; }
        
        .status-badge { font-size: 8px; padding: 3px 7px; border-radius: 4px; cursor: pointer; font-weight: 900; }
        .status-uploaded { background: var(--success); color: #000; }
        .status-pending { background: var(--orange); color: #000; }

        .otp-box { display: flex; align-items: center; justify-content: space-between; background: rgba(37,99,235,0.05); padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid var(--border); }
        .otp-num { font-family: monospace; font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        
        .timer-container { position: relative; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        .timer-text { font-size: 8px; font-weight: bold; color: var(--gray); position: absolute; }
        .timer-svg { transform: rotate(-90deg); width: 20px; height: 20px; }
        .timer-circle-prog { fill: none; stroke: var(--primary); stroke-width: 3; stroke-dasharray: 63; }

        .btn-copy-main { background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold; }
        
        #main-app, #login-screen { display: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div id="login-screen" style="text-align: center; margin-top: 100px;">
        <h2>2FA AUTH CLOUD</h2>
        <button onclick="login()" style="padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;">SIGN IN WITH GOOGLE</button>
    </div>

    <div id="main-app">
        <div class="header">
            <div>
                <h3 style="margin:0">G2G Manager</h3>
                <div class="stock-info">
                    <span id="stTotal">Total: 0</span> • <span id="stG2G" style="color:var(--success)">G2G: 0</span>
                </div>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:10px">LOGOUT</button>
        </div>

        <div class="card-form">
            <input type="text" id="accName" placeholder="Email Akun" autocomplete="off">
            <input type="text" id="accKey" placeholder="Secret Key" oninput="this.value = this.value.replace(/\s/g, '').toUpperCase()" autocomplete="off">
            <button class="btn-save" onclick="saveAccount()">Save to Cloud</button>
        </div>

        <div class="filter-tabs">
            <div class="tab active" onclick="setFilter('ALL', this)">Semua</div>
            <div class="tab" onclick="setFilter('BELUM', this)">Belum</div>
            <div class="tab" onclick="setFilter('UPLOAD G2G', this)">G2G</div>
        </div>

        <div class="selection-bar" id="selectionBar">
            <label style="cursor:pointer"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> Select All</label>
            <button class="btn-top" onclick="copySelected()">Copy Data</button>
        </div>

        <input type="text" id="searchInput" placeholder="Search..." oninput="render()" style="background:var(--card); margin-bottom:15px">

        <div id="displayList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3mIXsaFlLbpKm5qufpP6Trr9S1DXixKk",
        authDomain: "fanews-b8b0f.firebaseapp.com",
        databaseURL: "https://fanews-b8b0f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fanews-b8b0f",
        storageBucket: "fanews-b8b0f.firebasestorage.app",
        messagingSenderId: "514202109743",
        appId: "1:514202109743:web:ef7f55adfaed815bbc43da"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let userUid = null, accounts = [], currentFilter = 'ALL';

    auth.onAuthStateChanged(user => {
        if (user) {
            userUid = user.uid;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { if(confirm("Logout?")) auth.signOut(); }

    function loadData() {
        db.ref('users/' + userUid).on('value', snapshot => {
            accounts = [];
            snapshot.forEach(child => { accounts.push({ id: child.key, ...child.val() }); });
            document.getElementById('stTotal').innerText = "Total: " + accounts.length;
            document.getElementById('stG2G').innerText = "G2G: " + accounts.filter(a => a.status === 'UPLOAD G2G').length;
            render();
        });
    }

    function saveAccount() {
        const name = document.getElementById('accName').value.trim();
        const key = document.getElementById('accKey').value.trim();
        if (name && key) {
            db.ref('users/' + userUid).push({ name, key, status: 'BELUM' });
            document.getElementById('accName').value = ''; document.getElementById('accKey').value = '';
        }
    }

    function setFilter(f, el) {
        currentFilter = f;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function toggleSelectAll() {
        const checked = document.getElementById('selectAll').checked;
        document.querySelectorAll('.acc-check').forEach(c => c.checked = checked);
    }

    function copySelected() {
        let text = "";
        const items = document.querySelectorAll('.acc-item');
        items.forEach(item => {
            if (item.querySelector('.acc-check').checked) {
                text += `${item.querySelector('.email-display').innerText}\n${item.querySelector('.key-display').innerText}\n\n`;
            }
        });
        if (!text) return alert("Pilih akun dulu!");
        navigator.clipboard.writeText(text.trim());
        alert("Data terpilih disalin!");
    }

    function render() {
        const div = document.getElementById('displayList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = [...accounts].reverse();
        if (currentFilter !== 'ALL') filtered = filtered.filter(a => a.status === currentFilter);
        filtered = filtered.filter(a => a.name.toLowerCase().includes(search));
        
        document.getElementById('selectionBar').style.display = filtered.length > 0 ? 'flex' : 'none';
        div.innerHTML = '';
        filtered.forEach(acc => {
            const isG2G = acc.status === 'UPLOAD G2G';
            div.innerHTML += `
                <div class="acc-item">
                    <input type="checkbox" class="acc-check">
                    <div class="content-area">
                        <div style="display:flex; justify-content:space-between">
                            <div>
                                <span class="email-display">${acc.name}</span>
                                <span class="key-display">${acc.key}</span>
                            </div>
                            <button class="status-badge ${isG2G ? 'status-uploaded' : 'status-pending'}" 
                                onclick="db.ref('users/${userUid}/${acc.id}').update({status:'${isG2G?'BELUM':'UPLOAD G2G'}'})">
                                ${acc.status}
                            </button>
                        </div>
                        <div class="otp-box">
                            <div style="display:flex; align-items:center; gap:8px; cursor:pointer" onclick="copyOTP('${acc.id}', null)">
                                <div class="timer-container">
                                    <svg class="timer-svg"><circle cx="10" cy="10" r="9" fill="none" stroke="#333" stroke-width="2"/><circle id="circle-${acc.id}" cx="10" cy="10" r="9" class="timer-circle-prog"/></svg>
                                    <div class="timer-text" id="t-${acc.id}">30</div>
                                </div>
                                <div class="otp-num" id="otp-${acc.id}">------</div>
                            </div>
                            <button class="btn-copy-main" id="btn-otp-${acc.id}" onclick="copyOTP('${acc.id}', this)">COPY</button>
                        </div>
                        <button onclick="if(confirm('Hapus?')) db.ref('users/${userUid}/${acc.id}').remove()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:10px; float:right">Hapus</button>
                    </div>
                </div>`;
        });
    }

    function updateCodes() {
        const remain = 30 - (Math.floor(Date.now() / 1000) % 30);
        accounts.forEach(acc => {
            try {
                let totp = new OTPAuth.TOTP({ secret: acc.key });
                const el = document.getElementById('otp-' + acc.id);
                if(el) el.innerText = totp.generate();
                const circ = document.getElementById('circle-' + acc.id);
                if(circ) circ.style.strokeDashoffset = 63 - (remain/30*63);
                const txt = document.getElementById('t-' + acc.id);
                if(txt) txt.innerText = remain;
            } catch (e) {}
        });
    }

    function copyOTP(id, btn) {
        navigator.clipboard.writeText(document.getElementById('otp-' + id).innerText);
        const target = btn || document.getElementById('btn-otp-' + id);
        target.innerText = 'DONE';
        setTimeout(() => target.innerText = 'COPY', 800);
    }

    setInterval(updateCodes, 1000);
</script>
</body>
</html>

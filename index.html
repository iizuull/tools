<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Admin Pro v35.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #000; --card: #121212; --border: #333; --text: #fff; --gray: #888; --danger: #ef4444; --success: #22c55e; --orange: #f59e0b; --purple: #a855f7; --cyan: #06b6d4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; }
        .header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .stat-box { background: #1a1a1a; padding: 6px; border-radius: 6px; text-align: center; border: 1px solid var(--border); }
        .stat-box small { display: block; font-size: 8px; color: var(--gray); text-transform: uppercase; }
        .stat-box b { font-size: 11px; }
        .master-pw-bar { background: rgba(245, 158, 11, 0.1); border: 1px dashed var(--orange); padding: 10px; border-radius: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .filter-tabs { display: flex; gap: 6px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .tab { flex: 0 0 auto; min-width: 75px; padding: 10px 5px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--gray); cursor: pointer; font-size: 10px; font-weight: bold; text-align: center; }
        .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .selection-bar { display: none; background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid var(--primary); margin-bottom: 15px; flex-direction: column; }
        .grid-bulk { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
        .btn-bulk { border: none; font-size: 9px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 6px; padding: 10px 5px; }
        .acc-item { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; gap: 10px; }
        .acc-check { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        .status-badge { font-size: 8px; padding: 4px 8px; border-radius: 5px; font-weight: 900; border: none; cursor: pointer; }
        .status-STOK { background: var(--orange); color: #000; }
        .status-G2G { background: var(--success); color: #000; }
        .status-CLIENT { background: var(--cyan); color: #000; }
        .status-SOLD { background: var(--purple); color: #fff; }
        .status-DISABLE { background: var(--danger); color: #fff; }
        .otp-box { display: flex; align-items: center; justify-content: space-between; background: rgba(37,99,235,0.05); padding: 8px; border-radius: 8px; margin: 8px 0; border: 1px solid var(--border); }
        .otp-num { font-family: monospace; font-size: 26px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        .btn-action-small { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        .btn-save { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h3 style="margin:0">Admin Control Panel</h3>
        <div class="master-pw-bar" onclick="copyText('sayamanusia')">
            <div><small style="display:block; font-size:8px; color:var(--gray)">MASTER PASSWORD</small><b style="color:var(--orange)">sayamanusia</b></div>
            <span style="font-size:9px; color:var(--gray)">SALIN</span>
        </div>
        <div class="stats-grid">
            <div class="stat-box"><small>STOK</small><b id="cStock">0</b></div>
            <div class="stat-box"><small>G2G</small><b id="cG2G">0</b></div>
            <div class="stat-box"><small>CLIENT</small><b id="cClient">0</b></div>
            <div class="stat-box"><small>TRASH</small><b id="cTrash" style="color:var(--danger)">0</b></div>
        </div>
    </div>

    <div class="card-form">
        <input type="text" id="accName" placeholder="Email Address">
        <input type="text" id="accKey" placeholder="Secret Key" oninput="this.value = this.value.toUpperCase()">
        <button class="btn-save" onclick="saveAccount()">SIMPAN KE FIREBASE</button>
    </div>

    <div class="filter-tabs">
        <div class="tab active" onclick="setFilter('ALL', this)">SEMUA</div>
        <div class="tab" onclick="setFilter('STOK', this)">STOK</div>
        <div class="tab" onclick="setFilter('G2G', this)">G2G</div>
        <div class="tab" onclick="setFilter('CLIENT', this)">CLIENT</div>
        <div class="tab" onclick="setFilter('SOLD', this)">SOLD</div>
        <div class="tab" onclick="setFilter('DISABLE', this)" style="color:var(--danger)">🗑️ TRASH</div>
    </div>

    <div class="selection-bar" id="selectionBar">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px">
            <label><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> Pilih Semua</label>
            <span id="selCount">0 selected</span>
        </div>
        <div class="grid-bulk">
            <button class="btn-bulk" style="background:var(--primary); color:white" onclick="bulkCopy()">Salin</button>
            <button class="btn-bulk" style="background:var(--orange); color:black" onclick="bulkUpdateStatus('STOK')">ke Stok</button>
            <button class="btn-bulk" style="background:var(--cyan); color:black" onclick="bulkUpdateStatus('CLIENT')">ke Client</button>
            <button class="btn-bulk" style="background:var(--danger); color:white" onclick="bulkUpdateStatus('DISABLE')">Buang</button>
            <button id="btnBulkDelete" class="btn-bulk" style="background:#444; color:white; grid-column: span 4; margin-top: 5px; display: none;" onclick="bulkDelete()">HAPUS PERMANEN (DARI TRASH)</button>
        </div>
    </div>

    <textarea id="searchInput" placeholder="Cari email..." oninput="render()" style="width:100%; background:#111; border:1px solid #333; color:white; padding:10px; border-radius:8px; margin-bottom:10px;"></textarea>
    <div id="displayList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3mIXsaFlLbpKm5qufpP6Trr9S1DXixKk",
        authDomain: "fanews-b8b0f.firebaseapp.com",
        databaseURL: "https://fanews-b8b0f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fanews-b8b0f",
        storageBucket: "fanews-b8b0f.firebasestorage.app",
        messagingSenderId: "514202109743",
        appId: "1:514202109743:web:ef7f55adfaed815bbc43da"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // UID SUDAH TERPASANG OTOMATIS
    const userUid = "fRRx9SbBT5clwG0kjWAcd4uEd693"; 

    let accounts = [], currentFilter = 'ALL';

    function loadData() {
        db.ref('users/' + userUid).on('value', snapshot => {
            accounts = [];
            snapshot.forEach(child => { accounts.push({ id: child.key, ...child.val() }); });
            document.getElementById('cStock').innerText = accounts.filter(a => a.status === 'STOK').length;
            document.getElementById('cG2G').innerText = accounts.filter(a => a.status === 'G2G').length;
            document.getElementById('cClient').innerText = accounts.filter(a => a.status === 'CLIENT').length;
            document.getElementById('cTrash').innerText = accounts.filter(a => a.status === 'DISABLE').length;
            render();
        });
    }

    function saveAccount() {
        const name = document.getElementById('accName').value.trim(), key = document.getElementById('accKey').value.replace(/\s/g, '');
        if(!name || !key) return alert("Isi data!");
        const date = new Date().toLocaleString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }).replace(/:/g, '.');
        db.ref('users/' + userUid).push({ name, key, status: 'STOK', date });
        document.getElementById('accName').value=''; document.getElementById('accKey').value='';
    }

    function render() {
        const div = document.getElementById('displayList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = [...accounts].reverse();
        if (currentFilter !== 'ALL') filtered = filtered.filter(a => a.status === currentFilter);
        if (search) filtered = filtered.filter(a => a.name.toLowerCase().includes(search));
        
        div.innerHTML = '';
        filtered.forEach(acc => {
            div.innerHTML += `
                <div class="acc-item" data-id="${acc.id}">
                    <input type="checkbox" class="acc-check" onclick="updateSelCount()">
                    <div style="flex-grow:1">
                        <span style="font-size:8px; color:#666; display:block; margin-bottom:4px">${acc.date || ''}</span>
                        <div style="display:flex; justify-content:space-between">
                            <div><b>${acc.name}</b><br><small style="color:#555; font-family:monospace">${acc.key}</small></div>
                            <button class="status-badge status-${acc.status}" onclick="cycleStatus('${acc.id}', '${acc.status}')">${acc.status}</button>
                        </div>
                        <div class="otp-box"><div class="otp-num" id="otp-${acc.id}">------</div><small id="t-${acc.id}">30s</small></div>
                        <div style="display:flex; gap:10px">
                            <button class="btn-action-small" onclick="copyText('${acc.name}')">MAIL</button>
                            <button class="btn-action-small" onclick="copyText('${acc.key}')">KEY</button>
                            <button class="btn-action-small" style="background:var(--primary)" onclick="copyG2G('${acc.name}', '${acc.id}')">G2G READY</button>
                        </div>
                    </div>
                </div>`;
        });
        updateSelCount();
    }

    function cycleStatus(id, cur) {
        const flow = ['STOK', 'G2G', 'CLIENT', 'SOLD', 'DISABLE'];
        let next = flow[(flow.indexOf(cur) + 1) % flow.length];
        db.ref(`users/${userUid}/${id}`).update({ status: next });
    }

    function bulkUpdateStatus(s) {
        document.querySelectorAll('.acc-item').forEach(item => {
            if (item.querySelector('.acc-check').checked) db.ref(`users/${userUid}/${item.dataset.id}`).update({ status: s });
        });
    }

    function bulkDelete() {
        if(confirm("Hapus permanen dari Trash?")) {
            document.querySelectorAll('.acc-item').forEach(item => {
                if (item.querySelector('.acc-check').checked) db.ref(`users/${userUid}/${item.dataset.id}`).remove();
            });
        }
    }

    function bulkCopy() {
        let text = "";
        document.querySelectorAll('.acc-item').forEach(item => {
            if (item.querySelector('.acc-check').checked) {
                const acc = accounts.find(a => a.id === item.dataset.id);
                text += `${acc.name}\n${acc.key}\n\n`;
            }
        });
        navigator.clipboard.writeText(text.trim()); alert("Copied!");
    }

    function copyText(txt) { navigator.clipboard.writeText(txt); alert("Copied!"); }
    function copyG2G(email, id) { const otp = document.getElementById('otp-'+id).innerText; navigator.clipboard.writeText(`${email} | sayamanusia | ${otp}`); alert("G2G Copied!"); }
    function toggleSelectAll() { document.querySelectorAll('.acc-check').forEach(c => c.checked = document.getElementById('selectAll').checked); updateSelCount(); }
    function updateSelCount() {
        const count = document.querySelectorAll('.acc-check:checked').length;
        document.getElementById('selectionBar').style.display = count > 0 ? 'flex' : 'none';
        document.getElementById('selCount').innerText = count + " selected";
        document.getElementById('btnBulkDelete').style.display = (count > 0 && currentFilter === 'DISABLE') ? 'block' : 'none';
    }
    function setFilter(f, el) { currentFilter = f; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); render(); }

    setInterval(() => {
        const remain = 30 - (Math.floor(Date.now() / 1000) % 30);
        accounts.forEach(acc => {
            try {
                let totp = new OTPAuth.TOTP({ secret: acc.key });
                const el = document.getElementById('otp-' + acc.id); if(el) el.innerText = totp.generate();
                const tEl = document.getElementById('t-' + acc.id); if(tEl) tEl.innerText = remain + "s";
            } catch (e) {}
        });
    }, 1000);

    loadData();
</script>
</body>
</html>

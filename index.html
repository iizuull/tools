<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Authenticator Cloud Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; --bg: #000000; --card: #121212; --border: #333; 
            --text: #ffffff; --gray: #888; --danger: #ef4444; --success: #22c55e;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .wrapper { width: 100%; max-width: 480px; }
        
        /* Login Screen */
        .login-screen { text-align: center; margin-top: 80px; padding: 40px 20px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); }
        .btn-google { background: #fff; color: #000; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; font-size: 14px; transition: 0.2s; }
        .btn-google:hover { background: #eee; }

        /* Main App */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .user-tag { font-size: 10px; color: var(--gray); background: #1a1a1a; padding: 4px 10px; border-radius: 15px; }
        
        .card-form { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: #000; color: #fff; box-sizing: border-box; font-size: 14px; }
        .btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; }

        .acc-item { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .acc-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .otp-row { display: flex; align-items: center; justify-content: space-between; background: rgba(37, 99, 235, 0.08); padding: 12px; border-radius: 10px; border: 1px solid var(--primary); margin-bottom: 8px; }
        .otp-num { font-family: monospace; font-size: 32px; font-weight: 800; color: var(--primary); letter-spacing: 3px; }
        
        .btn-copy-otp { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.3s; }
        .btn-copy-otp.copied { background: var(--success) !important; color: #000 !important; }

        .item-footer { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--gray); }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; text-decoration: underline; }
        
        #main-app { display: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div id="login-screen" class="login-screen">
        <h2 style="margin:0">2FA Authenticator</h2>
        <p style="color:var(--gray); font-size: 13px;">Akses Cloud Database Penjualan</p>
        <button class="btn-google" onclick="login()">SIGN IN WITH GOOGLE</button>
    </div>

    <div id="main-app">
        <div class="header">
            <span class="user-tag" id="user-display">---</span>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:11px">Logout</button>
        </div>

        <div class="card-form">
            <input type="text" id="accName" placeholder="Email / Nama Akun" autocomplete="off">
            <input type="text" id="accKey" placeholder="Secret Key" autocomplete="off">
            <button class="btn-save" onclick="saveToCloud()">Simpan ke Cloud</button>
        </div>

        <input type="text" id="searchInput" placeholder="Cari akun..." oninput="render()" style="background:var(--card); margin-bottom:15px;">
        
        <div id="displayList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3mIXsaFlLbpKm5qufpP6Trr9S1DXixKk",
        authDomain: "fanews-b8b0f.firebaseapp.com",
        databaseURL: "https://fanews-b8b0f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fanews-b8b0f",
        storageBucket: "fanews-b8b0f.firebasestorage.app",
        messagingSenderId: "514202109743",
        appId: "1:514202109743:web:ef7f55adfaed815bbc43da",
        measurementId: "G-FG1F0E35N6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let userUid = null;
    let accounts = [];

    auth.onAuthStateChanged(user => {
        if (user) {
            userUid = user.uid;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display').innerText = user.email;
            loadData();
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert(e.message));
    }

    function logout() { auth.signOut(); }

    function loadData() {
        db.ref('users/' + userUid).on('value', snapshot => {
            accounts = [];
            snapshot.forEach(child => {
                accounts.push({ id: child.key, ...child.val() });
            });
            render();
        });
    }

    function saveToCloud() {
        const name = document.getElementById('accName').value.trim();
        const key = document.getElementById('accKey').value.replace(/\s/g, '').toUpperCase();
        if (!name || !key) return alert("Lengkapi data!");
        if (accounts.some(a => a.name.toLowerCase() === name.toLowerCase())) return alert("Email sudah ada!");
        
        db.ref('users/' + userUid).push({ name, key });
        document.getElementById('accName').value = '';
        document.getElementById('accKey').value = '';
    }

    function render() {
        const div = document.getElementById('displayList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        div.innerHTML = '';

        [...accounts].reverse().forEach(acc => {
            if (!acc.name.toLowerCase().includes(search)) return;
            div.innerHTML += `
                <div class="acc-item">
                    <div class="acc-info">
                        <strong>${acc.name}</strong>
                        <button class="btn-del" onclick="del('${acc.id}')">Delete</button>
                    </div>
                    <div class="otp-row">
                        <div class="otp-num" id="otp-${acc.id}">------</div>
                        <button class="btn-copy-otp" id="btn-${acc.id}" onclick="copyOTP('${acc.id}')">COPY</button>
                    </div>
                    <div class="item-footer">
                        <span style="font-family:monospace">KEY: ${acc.key.substring(0,4)}...${acc.key.slice(-4)}</span>
                        <span id="t-${acc.id}">30s</span>
                    </div>
                </div>`;
        });
    }

    function copyOTP(id) {
        const text = document.getElementById('otp-' + id).innerText;
        navigator.clipboard.writeText(text);
        const btn = document.getElementById('btn-' + id);
        const oldText = btn.innerText;
        btn.innerText = 'DONE';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.innerText = oldText;
            btn.classList.remove('copied');
        }, 800);
    }

    function del(id) {
        if(confirm("Hapus data dari cloud?")) db.ref('users/' + userUid + '/' + id).remove();
    }

    function update() {
        const remain = 30 - (Math.floor(Date.now() / 1000) % 30);
        accounts.forEach(acc => {
            try {
                let totp = new OTPAuth.TOTP({ secret: acc.key });
                const el = document.getElementById('otp-' + acc.id);
                if (el) el.innerText = totp.generate();
                const tEl = document.getElementById('t-' + acc.id);
                if (tEl) tEl.innerText = remain + "s";
            } catch (e) {}
        });
    }

    setInterval(update, 1000);
</script>
</body>
</html>
